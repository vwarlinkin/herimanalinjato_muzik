<!DOCTYPE html>
<html lang="fr" data-theme="dark">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <title>Familia Music</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- TOP BAR -->
  <header class="topbar">
    <button class="icon-btn" id="openPlaylist" aria-label="Playlist">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
        <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="15" y2="12"/><line x1="3" y1="18" x2="10" y2="18"/>
      </svg>
    </button>
    <span class="topbar-title">Familia Mozika Herimanalinjato</span>
    <button class="icon-btn theme-toggle" id="themeToggle" aria-label="Thème">
      <span class="icon-sun">☀︎</span>
      <span class="icon-moon">◗</span>
    </button>
  </header>

  <!-- PLAYLIST SHEET -->
  <div class="sheet-overlay" id="sheetOverlay"></div>
  <aside class="playlist-sheet" id="playlistSheet">
    <div class="sheet-handle"></div>
    <div class="sheet-head">
      <h2>Playlist</h2>
      <div class="search-bar">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        <input type="text" id="searchInput" placeholder="Rechercher…" autocomplete="off"/>
      </div>
      <div class="filter-chips" id="filterChips">
        <button class="chip active" data-filter="all">Tout</button>
        <button class="chip" data-filter="ambient">Ambient</button>
        <button class="chip" data-filter="electronic">Electronic</button>
        <button class="chip" data-filter="cinematic">Cinematic</button>
      </div>
    </div>
    <ul class="track-list" id="trackList"></ul>
  </aside>

  <!-- MAIN PLAYER -->
  <main class="player">

    <div class="cover-section">
      <div class="cover-wrap" id="coverWrap">
        <div class="cover-glow" id="coverGlow"></div>
        <div class="cover-art" id="coverArt">
          <img id="coverImg" src="" alt=""/>
          <div class="cover-placeholder" id="coverPlaceholder">
            <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round"><circle cx="9" cy="18" r="3"/><circle cx="18" cy="16" r="3"/><polyline points="12 18 12 2 21 4 21 16"/></svg>
          </div>
        </div>
      </div>
    </div>

    <div class="info-section">
      <div class="info-row">
        <div class="info-text">
          <h1 class="track-name" id="trackName">—</h1>
          <p class="track-genre" id="trackGenre">Sélectionne un morceau</p>
        </div>
        <button class="dl-btn" id="btnDownload" title="Télécharger">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.3" stroke-linecap="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
        </button>
      </div>
      <div class="synopsis-card" id="synopsisCard">
        <p id="synopsisText"></p>
      </div>
    </div>

    <div class="viz-wrap">
      <canvas id="visualizer"></canvas>
    </div>

    <div class="progress-section">
      <div class="progress-track" id="progressTrack">
        <div class="progress-fill" id="progressFill"></div>
        <div class="progress-dot" id="progressDot"></div>
      </div>
      <div class="time-row">
        <span id="timeCurrent">0:00</span>
        <span id="timeTotal">0:00</span>
      </div>
    </div>

    <div class="controls-section">
      <button class="ctrl-ghost" id="btnShuffle">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="16 3 21 3 21 8"/><line x1="4" y1="20" x2="21" y2="3"/><polyline points="21 16 21 21 16 21"/><line x1="15" y1="15" x2="21" y2="21"/></svg>
      </button>
      <button class="ctrl-step" id="btnPrev">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 6h2v12H6zm3.5 6 8.5 6V6z"/></svg>
      </button>
      <button class="ctrl-play" id="btnPlay">
        <svg class="ico-play" width="30" height="30" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
        <svg class="ico-pause" width="30" height="30" viewBox="0 0 24 24" fill="currentColor" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
      </button>
      <button class="ctrl-step" id="btnNext">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="currentColor"><path d="M6 18l8.5-6L6 6v12zm2-8.14L11.03 12 8 14.14V9.86zM16 6h2v12h-2z"/></svg>
      </button>
      <button class="ctrl-ghost" id="btnRepeat">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/></svg>
      </button>
    </div>

    <div class="bottom-row">
      <div class="vol-row">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor" class="vol-icon"><path d="M3 9v6h4l5 5V4L7 9H3z"/></svg>
        <input type="range" id="volSlider" min="0" max="1" step="0.01" value="0.8"/>
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor" class="vol-icon"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02zM14 3.23v2.06c2.89.86 5 3.54 5 6.71s-2.11 5.85-5 6.71v2.06c4.01-.91 7-4.49 7-8.77s-2.99-7.86-7-8.77z"/></svg>
      </div>
      <button class="lyrics-btn" id="btnLyrics">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
        Paroles
      </button>
    </div>

  </main>

  <!-- LYRICS MODAL -->
  <div class="lyrics-backdrop" id="lyricsBackdrop"></div>
  <div class="lyrics-modal" id="lyricsModal">
    <div class="lyrics-modal-head">
      <span class="lyrics-modal-title" id="lyricsSongName">Paroles</span>
      <button class="icon-btn" id="closeLyrics">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="lyrics-body" id="lyricsBody">
      <p class="lyrics-empty">Aucune parole disponible.</p>
    </div>
  </div>

  <audio id="audioEl" preload="metadata"></audio>
  <script src="tracks.js"></script>
  <script src="app.js"></script>
</body>
</html>
