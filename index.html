<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>🎵 Notre Musique</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <span class="logo-icon">◈</span>
        <span class="logo-text">NOS<br>SONS</span>
      </div>
      <button class="sidebar-toggle" id="sidebarToggle" aria-label="Fermer la sidebar">✕</button>
    </div>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Rechercher un titre…" autocomplete="off" />
      <span class="search-icon">⌕</span>
    </div>

    <div class="filter-bar">
      <button class="filter-btn active" data-filter="all">Tout</button>
      <button class="filter-btn" data-filter="genre1">Ambient</button>
      <button class="filter-btn" data-filter="genre2">Electronic</button>
      <button class="filter-btn" data-filter="genre3">Cinematic</button>
    </div>

    <ul class="track-list" id="trackList"></ul>
  </aside>

  <!-- SIDEBAR OPEN BTN (mobile/collapsed) -->
  <button class="open-sidebar-btn" id="openSidebar">☰ Playlist</button>

  <!-- MAIN CONTENT -->
  <main class="main" id="mainContent">

    <!-- NOW PLAYING -->
    <section class="now-playing" id="nowPlaying">

      <div class="album-art-wrap">
        <div class="album-art-ring"></div>
        <div class="album-art" id="albumArt">
          <img src="" alt="Pochette" id="albumImg" />
          <div class="album-placeholder" id="albumPlaceholder">◈</div>
        </div>
      </div>

      <div class="track-info">
        <div class="track-badge" id="trackBadge">En lecture</div>
        <h1 class="track-title" id="trackTitle">—</h1>
        <p class="track-subtitle" id="trackSubtitle">Sélectionne un morceau</p>

        <div class="synopsis-box" id="synopsisBox">
          <p id="synopsisText"></p>
        </div>
      </div>

    </section>

    <!-- VISUALIZER -->
    <section class="visualizer-section">
      <canvas id="visualizer"></canvas>
    </section>

    <!-- PLAYER CONTROLS -->
    <section class="player-controls">
      <div class="progress-wrap">
        <span class="time-label" id="currentTime">0:00</span>
        <div class="progress-bar" id="progressBar">
          <div class="progress-fill" id="progressFill"></div>
          <div class="progress-thumb" id="progressThumb"></div>
        </div>
        <span class="time-label" id="totalTime">0:00</span>
      </div>

      <div class="controls-row">
        <button class="ctrl-btn" id="btnShuffle" title="Shuffle">⇌</button>
        <button class="ctrl-btn" id="btnPrev" title="Précédent">⏮</button>
        <button class="ctrl-btn play-btn" id="btnPlay" title="Lecture">▶</button>
        <button class="ctrl-btn" id="btnNext" title="Suivant">⏭</button>
        <button class="ctrl-btn" id="btnRepeat" title="Répéter">↺</button>
      </div>

      <div class="extras-row">
        <div class="volume-wrap">
          <span>🔉</span>
          <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.8" />
        </div>
        <button class="extra-btn" id="btnDownload" title="Télécharger">⬇ Télécharger</button>
        <button class="extra-btn" id="btnLyrics" title="Paroles">✎ Paroles</button>
      </div>
    </section>

    <!-- LYRICS PANEL -->
    <section class="lyrics-panel" id="lyricsPanel">
      <div class="lyrics-header">
        <h2>Paroles</h2>
        <button id="closeLyrics">✕</button>
      </div>
      <div class="lyrics-content" id="lyricsContent">
        <p class="lyrics-placeholder">Aucune parole disponible pour ce morceau.</p>
      </div>
    </section>

  </main>

  <!-- Hidden audio element -->
  <audio id="audioPlayer" preload="metadata"></audio>

  <script src="tracks.js"></script>
  <script src="app.js"></script>
</body>
</html>
